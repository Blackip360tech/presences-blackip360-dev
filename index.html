<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>BlackIP360 — Présences [DEV]</title>

  <!-- MSAL.js 2.x (authentification Microsoft) -->
  <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>

  <style>
    /* ── Variables ──────────────────────────────────────────────────────── */
    :root {
      --primary:      #0078d4;
      --primary-dk:   #005a9e;
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --text:         #323130;
      --muted:        #605e5c;
      --border:       #edebe9;
      --success:      #198754;
      --danger:       #dc3545;
      --shadow:       0 2px 8px rgba(0,0,0,.10);
      --radius:       8px;
    }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: var(--primary); }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-size: .85em; }

    /* ── LOGIN ──────────────────────────────────────────────────────────── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0078d4 0%, #003f7f 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.3);
      max-width: 440px;
      width: 90%;
    }

    .login-logo {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .login-sub {
      color: var(--muted);
      margin: 8px 0 36px;
      font-size: 1rem;
    }

    #loginBtn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    #loginBtn:hover { background: var(--primary-dk); }

    .login-hint { margin-top: 20px; color: #aaa; font-size: .8rem; }

    /* ── APP SHELL ──────────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Header */
    header {
      background: var(--primary);
      color: #fff;
      height: 56px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .hdr-logo { font-weight: 800; font-size: 1.05rem; letter-spacing: .3px; white-space: nowrap; }
    .hdr-spacer { flex: 1; }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .85rem;
    }

    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem;
      flex-shrink: 0;
    }

    .user-details { display: flex; flex-direction: column; line-height: 1.2; }
    #userNom  { font-weight: 600; }
    #userEmail, #userDept { font-size: .72rem; opacity: .8; }

    #logoutBtn {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
      transition: background .2s;
      white-space: nowrap;
    }
    #logoutBtn:hover { background: rgba(255,255,255,.25); }

    /* Tab nav */
    nav.tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      overflow-x: auto;
      gap: 0;
    }

    .tab-btn {
      padding: 15px 18px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover  { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Content */
    main {
      flex: 1;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .tab-content[hidden] { display: none !important; }

    /* ── SHARED COMPONENTS ──────────────────────────────────────────────── */
    .loading  { text-align: center; padding: 56px; color: var(--muted); font-size: 1.05rem; }
    .hint     { color: var(--muted); padding: 32px; text-align: center; }
    .muted    { color: var(--muted); font-size: .8rem; }

    .error {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      color: #c53030;
      border-radius: var(--radius);
      padding: 16px 20px;
      margin: 16px 0;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
    }

    .table-wrap { overflow-x: auto; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
    }
    tbody td   { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: .875rem; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--bg); }

    .btn-primary {
      padding: 8px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover { background: var(--primary-dk); }

    .btn-secondary {
      padding: 8px 16px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .875rem;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-secondary:hover { background: var(--bg); }

    h2 { font-size: 1.25rem; margin-bottom: 16px; }
    h3 { margin: 24px 0 12px; font-size: .82rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }

    /* ── MON STATUT ─────────────────────────────────────────────────────── */
    .statut-container { max-width: 820px; margin: 0 auto; }

    .current-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      border-left: 6px solid #aaa;
    }
    .current-card.present { border-left-color: var(--success); }
    .current-card.absent  { border-left-color: var(--danger);  }
    .current-card.none    { border-left-color: #ccc; }

    .current-icon  { font-size: 3rem; margin-bottom: 8px; }
    .current-label { font-size: 1.2rem; font-weight: 600; }
    .current-time  { color: var(--muted); margin-top: 4px; font-size: .9rem; }

    .notes-row { margin-bottom: 16px; }
    .notes-row textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .9rem;
      resize: vertical;
      min-height: 56px;
      transition: border-color .15s, box-shadow .15s;
    }
    .notes-row textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,120,212,.15);
    }

    .statuts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }

    .statut-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      text-align: left;
      font-size: .875rem;
      line-height: 1.3;
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }
    .statut-btn:hover {
      border-color: var(--c, var(--primary));
      background: #f8f9fa;
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .statut-btn.selected {
      border-color: var(--c, var(--primary));
      background: #f0f7ff;
      font-weight: 600;
    }
    .statut-btn:disabled { opacity: .5; cursor: wait; }
    .sbtn-icon  { font-size: 1.4rem; flex-shrink: 0; }
    .sbtn-label { flex: 1; }

    /* ── ADMIN ──────────────────────────────────────────────────────────── */
    .admin-wrap {}

    .stat-row {
      display: flex;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 24px;
      text-align: center;
      box-shadow: var(--shadow);
      min-width: 110px;
      border-top: 4px solid transparent;
    }
    .stat-card.green { border-top-color: var(--success); }
    .stat-card.red   { border-top-color: var(--danger);  }
    .stat-card.blue  { border-top-color: var(--primary); }
    .stat-n { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-l { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-row input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .875rem;
    }
    .filter-row input[type="text"]:focus { outline: none; border-color: var(--primary); }

    .filter-row select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .875rem;
      background: var(--surface);
      cursor: pointer;
    }

    /* ── TV ─────────────────────────────────────────────────────────────── */
    .tv-wrap {
      background: #0a0a1e;
      color: #fff;
      min-height: calc(100vh - 120px);
      padding: 20px;
      border-radius: var(--radius);
    }

    .tv-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      flex-wrap: wrap;
      gap: 8px;
    }

    .tv-logo   { font-size: 1.4rem; font-weight: 800; color: #4da6ff; }
    .tv-clock  { font-size: 1rem;   color: rgba(255,255,255,.7); }
    .tv-totals { font-size: .9rem;  color: rgba(255,255,255,.6); }

    .tv-cols { display: flex; gap: 20px; }
    .tv-col  { flex: 1; }

    .tv-col-hdr {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 6px;
    }
    .present-hdr { background: rgba(25,135,84,.25); color: #6be0a1; }
    .absent-hdr  { background: rgba(220,53,69,.20); color: #f08090; }

    .tv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .tv-card {
      background: rgba(255,255,255,.05);
      border: 2px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }

    .tv-icon   { font-size: 2rem; margin-bottom: 6px; }
    .tv-name   { font-weight: 600; font-size: .85rem; margin-bottom: 4px; }
    .tv-statut { font-size: .72rem; margin-bottom: 4px; }
    .tv-time   { font-size: .68rem; color: rgba(255,255,255,.45); }
    .tv-ftr    { text-align: center; margin-top: 16px; font-size: .72rem; color: rgba(255,255,255,.35); }
    .tv-error  { color: #f08090; }

    /* ── PAYE ───────────────────────────────────────────────────────────── */
    .paye-wrap    { max-width: 920px; }
    .paye-filters { display: flex; gap: 10px; margin: 14px 0 20px; flex-wrap: wrap; align-items: center; }
    .paye-filters label { display: flex; align-items: center; gap: 6px; font-size: .875rem; }
    .paye-filters input[type="date"] {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .875rem;
    }

    /* ── ACCÈS ──────────────────────────────────────────────────────────── */
    .acces-wrap { max-width: 800px; }

    .acces-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .acces-card h3 { margin-top: 0; margin-bottom: 14px; font-size: .95rem; color: var(--text); text-transform: none; letter-spacing: 0; }
    .acces-card table { font-size: .875rem; }
    .acces-card td:first-child { color: var(--muted); width: 130px; padding: 6px 12px 6px 0; }
    .acces-card td:last-child  { padding: 6px 0; }

    .checklist { list-style: none; padding: 0; }
    .checklist li { padding: 6px 0; padding-left: 28px; position: relative; font-size: .9rem; }
    .checklist li::before { position: absolute; left: 0; }
    .checklist li.done::before { content: '✅'; }
    .checklist li.todo::before { content: '⬜'; }

    .link-row  { display: flex; gap: 10px; flex-wrap: wrap; }
    .ext-link  {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: .875rem;
      transition: background .2s;
    }
    .ext-link:hover { background: var(--primary-dk); color: #fff; }

    /* ── TOAST ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #323130;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: .9rem;
      transition: transform .3s;
      z-index: 1000;
      max-width: 420px;
      text-align: center;
      pointer-events: none;
    }
    #toast.show    { transform: translateX(-50%) translateY(0); }
    #toast.error   { background: var(--danger);  }
    #toast.success { background: var(--success); }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      main { padding: 12px; }
      header { padding: 0 12px; }
      .user-details { display: none; }
      .stat-row { gap: 10px; }
      .stat-card { min-width: 90px; padding: 14px 16px; }
      .tv-cols { flex-direction: column; }
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">BlackIP360</div>
    <div class="login-sub">Système de gestion des présences</div>

    <button id="loginBtn">
      <!-- Icône Microsoft -->
      <svg width="20" height="20" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1"  y="1"  width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1"  width="9" height="9" fill="#7fba00"/>
        <rect x="1"  y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Connexion avec Microsoft 365
    </button>

    <p class="login-hint">Utilisez votre compte @blackip360.com</p>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════ APP ══ -->
<div id="app" hidden>

  <!-- Header -->
  <header>
    <div class="hdr-logo">BlackIP360 · Présences <span style="background:#ffc107;color:#333;font-size:.7rem;padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:700">DEV</span></div>
    <div class="hdr-spacer"></div>
    <div class="user-chip">
      <div class="user-avatar" id="userInitials">?</div>
      <div class="user-details">
        <span id="userNom">—</span>
        <span id="userEmail"></span>
        <span id="userDept"></span>
      </div>
      <button id="logoutBtn">Déconnexion</button>
    </div>
  </header>

  <!-- Tab navigation -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="statut">📍 Mon Statut</button>
    <button class="tab-btn" data-tab="admin" data-admin>👥 Admin</button>
    <button class="tab-btn" data-tab="tv"    data-admin>📺 TV</button>
    <button class="tab-btn" data-tab="paye"  data-admin>💰 Paye</button>
    <button class="tab-btn" data-tab="acces" data-admin>🔑 Accès</button>
  </nav>

  <!-- Content panels -->
  <main>
    <div id="tab-statut" class="tab-content"></div>
    <div id="tab-admin"  class="tab-content" hidden></div>
    <div id="tab-tv"     class="tab-content" hidden></div>
    <div id="tab-paye"   class="tab-content" hidden></div>
    <div id="tab-acces"  class="tab-content" hidden></div>
  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Scripts (ordre important) -->
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="graph.js"></script>
<script src="app.js"></script>

</body>
</html>
